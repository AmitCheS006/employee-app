<!DOCTYPE html>
<html>
<head>
    <title>Employee Database</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .controls { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .add-btn { display: inline-block; margin-top: 20px; padding: 10px 15px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; }
    </style>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#0d6efd">
</head>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/service-worker.js')
    .then(() => console.log("Service Worker Registered"));
}
</script>
<body>

    <h1>Employee Database</h1>

    <div class="controls">
        <form action="/" method="GET">
            <input type="text" name="q" placeholder="Search by name or PAN..." value="{{ query }}">
            <button type="submit">Search</button>
            <a href="/">Reset</a>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>SAIL_PERNO</th>
                <th>NAME</th>
                <th>GRD</th>
                <th>DSG</th>
                <th>ACCNO</th>
                <th>PAN</th>
                <th>DOJ</th>
                <th>DOB</th>
                <th>UANNO</th>
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
                <td>{{ row[5] }}</td>
                <td>{{ row[6] }}</td>
                <td>{{ row[7] }}</td>
                <td>{{ row[8] }}</td>
                <td>{{ row[9] }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="10" style="text-align: center;">No results found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/add" class="add-btn">+ Add New Member</a>

</body>
</html>
