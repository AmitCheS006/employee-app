<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#0d6efd">
</head>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/service-worker.js')
    .then(() => console.log("Service Worker Registered"));
}
</script>
<body>

<h2>Add New Employee</h2>

<form method="POST">

    Perno: <input type="text" name="sail_perno" required><br><br>
    Name: <input type="text" name="name"><br><br>
    Grade: <input type="text" name="grade"><br><br>
    Designation: <input type="text" name="designation"><br><br>
    Account No: <input type="text" name="accno"><br><br>
    PAN: <input type="text" name="pan"><br><br>
    DOJ: <input type="date" name="doj"><br><br>
    DOB: <input type="date" name="dob"><br><br>
    UAN: <input type="text" name="uanno"><br><br>

    <button type="submit">Save</button>

</form>

<br>
<a href="/">⬅ Back</a>

</body>
</html>
